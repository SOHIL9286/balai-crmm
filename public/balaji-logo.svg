<svg viewBox="0 0 180 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D99;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Blue Circle -->
  <circle cx="20" cy="35" r="18" fill="url(#blueGradient)"/>
  
  <!-- Orange Accent Arc -->
  <path d="M 38 17 A 18 18 0 0 1 38 53" stroke="#FF7043" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- White B Letter -->
  <text x="20" y="36" font-size="26" font-weight="800" font-family="Arial, Helvetica, sans-serif" fill="white" text-anchor="middle" dominant-baseline="middle">B</text>
  
  <!-- BALAJI Text -->
  <text x="50" y="27" font-size="15" font-weight="700" font-family="Arial, sans-serif" fill="#0052CC" letter-spacing="0.2" dominant-baseline="middle" text-anchor="start">BALAJI</text>
  
  <!-- Subtitle -->
  <text x="50" y="45" font-size="7" font-weight="600" font-family="Arial, sans-serif" fill="#FF7043" letter-spacing="0.4" dominant-baseline="middle" text-anchor="start">INSURANCE &amp; FINANCE</text>
</svg>